<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password · IMS PT Indoguna Utama</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="icon" type="image/x-icon" href="img/logo-indoguna.png" />

    <style>
      :root {
        --indoguna-red: #c8102e;
        --indoguna-red-dark: #a00d24;
        --indoguna-red-light: #fee2e2;
        --indoguna-gray: #f3f4f6;
        --indoguna-gray-border: #e5e7eb;
        --indoguna-text: #1f2937;
        --indoguna-text-muted: #6b7280;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--indoguna-gray);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .forgot-wrapper {
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
      }

      .forgot-card {
        background: #fff;
        border-radius: 24px;
        padding: 40px 36px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.08),
          0 8px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--indoguna-gray-border);
        transition: all 0.3s ease;
      }

      .forgot-card:hover {
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.1);
      }

      .forgot-brand {
        text-align: center;
        margin-bottom: 28px;
      }

      .forgot-brand .brand-icon {
        width: 64px;
        height: 64px;
        background: var(--indoguna-red);
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 28px;
        margin-bottom: 16px;
        box-shadow: 0 4px 16px;
      }

      .forgot-brand h1 {
        font-weight: 800;
        font-size: 22px;
        color: var(--indoguna-text);
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      .forgot-brand .subtitle {
        font-size: 14px;
        color: var(--indoguna-text-muted);
        font-weight: 400;
        max-width: 320px;
        margin: 0 auto;
      }

      .forgot-brand .subtitle strong {
        color: var(--indoguna-red);
        font-weight: 600;
      }

      .forgot-divider {
        border: none;
        border-top: 1px solid var(--indoguna-gray-border);
        margin: 24px 0;
      }

      .form-label {
        font-weight: 600;
        font-size: 14px;
        color: var(--indoguna-text);
        margin-bottom: 6px;
      }

      .form-control {
        border-radius: 12px;
        border: 1.5px solid var(--indoguna-gray-border);
        padding: 12px 16px;
        font-size: 14px;
        transition: all 0.25s ease;
        background: #fafbfc;
      }

      .form-control:focus {
        border-color: var(--indoguna-red);
        box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.1);
        background: #fff;
      }

      .form-control.is-invalid {
        border-color: #dc2626;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
      }

      .form-control.is-invalid:focus {
        border-color: #dc2626;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
      }

      .form-control.is-valid {
        border-color: #059669;
        box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
      }

      .form-control.is-valid:focus {
        border-color: #059669;
        box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15);
      }

      .input-group-text {
        background: #fafbfc;
        border: 1.5px solid var(--indoguna-gray-border);
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: var(--indoguna-text-muted);
        padding: 12px 14px;
      }

      .input-group .form-control {
        border-radius: 0 12px 12px 0;
        border-left: none;
      }

      .input-group .form-control:focus {
        border-left: none;
      }

      .input-group .form-control.is-invalid {
        border-left: none;
      }
      .input-group .form-control.is-valid {
        border-left: none;
      }

      .btn-forgot {
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        background: var(--indoguna-red);
        border: none;
        color: #fff;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-forgot:hover {
        background: var(--indoguna-red-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(200, 16, 46, 0.3);
      }

      .btn-forgot:active {
        transform: translateY(0);
      }

      .btn-forgot:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-forgot .spinner-border {
        width: 20px;
        height: 20px;
        border-width: 2px;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--indoguna-text-muted);
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: color 0.2s;
      }

      .btn-back:hover {
        color: var(--indoguna-red);
      }

      .alert-custom {
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        border: none;
        display: none;
        animation: slideDown 0.35s ease;
      }

      .alert-custom.show {
        display: block;
      }

      .alert-custom.danger {
        background: #fef2f2;
        color: #991b1b;
        border-left: 4px solid #dc2626;
      }

      .alert-custom.success {
        background: #ecfdf5;
        color: #065f46;
        border-left: 4px solid #059669;
      }

      .alert-custom.info {
        background: #eff6ff;
        color: #1e40af;
        border-left: 4px solid #3b82f6;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .success-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #ecfdf5;
        color: #059669;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        margin-bottom: 16px;
      }

      .forgot-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        color: var(--indoguna-text-muted);
      }

      .forgot-footer a {
        color: var(--indoguna-red);
        text-decoration: none;
        font-weight: 600;
      }

      .forgot-footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 480px) {
        .forgot-card {
          padding: 28px 20px;
        }

        .forgot-brand .brand-icon {
          width: 52px;
          height: 52px;
          font-size: 22px;
        }

        .forgot-brand h1 {
          font-size: 20px;
        }
      }

      /* Toast container */
      .toast-container-custom {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        max-width: 380px;
      }
      .toast-custom {
        background: #fff;
        border-radius: 12px;
        padding: 14px 20px;
        border-left: 5px solid var(--indoguna-red);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        gap: 14px;
        animation: slideInRight 0.35s ease;
        border: 1px solid var(--indoguna-gray-border);
        margin-bottom: 10px;
      }
      .toast-custom.success {
        border-left-color: #059669;
      }
      .toast-custom .toast-icon {
        font-size: 20px;
        color: var(--indoguna-red);
      }
      .toast-custom.success .toast-icon {
        color: #059669;
      }
      .toast-custom .toast-msg {
        flex: 1;
        font-weight: 500;
        color: #1f2937;
        font-size: 14px;
      }
      .toast-custom .toast-close {
        background: none;
        border: none;
        font-size: 18px;
        color: #9ca3af;
        cursor: pointer;
        padding: 0 4px;
      }
      .toast-custom .toast-close:hover {
        color: #4b5563;
      }
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="forgot-wrapper">
      <div class="forgot-card">
        <!-- Brand -->
        <div class="forgot-brand">
          <img src="img/logo-indoguna.png" alt="Indoguna Logo" class="brand-icon" />
          <h1>Lupa Password</h1>
          <div class="subtitle">Masukkan email Anda untuk menerima<br />link reset password.</div>
        </div>

        <!-- Alert -->
        <div class="alert-custom" id="forgotAlert">
          <i class="bi bi-exclamation-circle me-2"></i>
          <span id="alertMessage"></span>
        </div>

        <!-- Form -->
        <form id="forgotForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="admin@indoguna.com" value="admin@indoguna.com" required autofocus />
              <div class="invalid-feedback">Masukkan email yang valid.</div>
            </div>
          </div>

          <button type="submit" class="btn-forgot" id="resetBtn">
            <span id="resetText"><i class="bi bi-send me-2"></i>Kirim Link Reset</span>
            <span id="resetSpinner" class="d-none">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Mengirim...
            </span>
          </button>
        </form>

        <!-- Success Message (hidden by default) -->
        <div id="successMessage" class="text-center" style="display: none">
          <div class="success-icon"><i class="bi bi-check-lg"></i></div>
          <h5 class="fw-bold text-success">Email Terkirim!</h5>
          <p class="text-muted" style="font-size: 14px">
            Kami telah mengirimkan link reset password ke <strong id="sentEmail"></strong>.<br />
            Silakan cek kotak masuk email Anda.
          </p>
        </div>

        <!-- Back to Login -->
        <div class="text-center mt-4">
          <a href="login.html" class="btn-back"> <i class="bi bi-arrow-left"></i> Kembali ke Login </a>
        </div>

        <!-- Footer -->
        <div class="forgot-footer">&copy; 2026 PT. Indoguna Utama · v1.0</div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container-custom" id="toastContainer"></div>

    <script>
      $(function () {
        // ============================================================
        //  SHOW TOAST
        // ============================================================
        function showToast(message, type) {
          type = type || "info";
          const iconMap = {
            success: "bi-check-circle-fill",
            danger: "bi-x-circle-fill",
            info: "bi-info-circle-fill",
          };
          const icon = iconMap[type] || iconMap.info;
          const container = $("#toastContainer");
          const toast = $(`
                    <div class="toast-custom ${type}">
                        <div class="toast-icon"><i class="bi ${icon}"></i></div>
                        <div class="toast-msg">${message}</div>
                        <button class="toast-close"><i class="bi bi-x-lg"></i></button>
                    </div>
                `);
          container.append(toast);
          setTimeout(function () {
            toast.fadeOut(300, function () {
              $(this).remove();
            });
          }, 4500);
          toast.find(".toast-close").on("click", function () {
            toast.fadeOut(200, function () {
              $(this).remove();
            });
          });
        }

        // ============================================================
        //  SHOW ALERT
        // ============================================================
        function showAlert(message, type) {
          const alert = $("#forgotAlert");
          const alertMsg = $("#alertMessage");
          alert.removeClass("show danger success info");
          if (type === "danger") {
            alert.addClass("danger");
          } else if (type === "success") {
            alert.addClass("success");
          } else if (type === "info") {
            alert.addClass("info");
          }
          alertMsg.text(message);
          alert.addClass("show");
          clearTimeout(window.alertTimeout);
          window.alertTimeout = setTimeout(function () {
            alert.removeClass("show");
          }, 5000);
        }

        // ============================================================
        //  FORM SUBMIT
        // ============================================================
        $("#forgotForm").on("submit", function (e) {
          e.preventDefault();

          const email = $("#email").val().trim();

          // Reset validation
          $("#email").removeClass("is-invalid is-valid");

          // Validasi email
          if (!email || !email.includes("@")) {
            $("#email").addClass("is-invalid");
            showAlert("Masukkan email yang valid.", "danger");
            return;
          }

          // Simulasi loading
          $("#resetText").addClass("d-none");
          $("#resetSpinner").removeClass("d-none");
          $("#resetBtn").prop("disabled", true);

          // Simulasi proses reset password
          setTimeout(function () {
            const isValid = validEmails.some((e) => e.toLowerCase() === email.toLowerCase());

            // Reset button state
            $("#resetText").removeClass("d-none");
            $("#resetSpinner").addClass("d-none");
            $("#resetBtn").prop("disabled", false);

            if (isValid) {
              // Email terdaftar - success
              $("#email").addClass("is-valid");
              showAlert("✅ Link reset password telah dikirim ke " + email, "success");

              // Sembunyikan form, tampilkan success message
              $("#forgotForm").slideUp(400, function () {
                $("#sentEmail").text(email);
                $("#successMessage").fadeIn(400);
              });

              // Toast notifikasi
              showToast("📧 Link reset password telah dikirim ke " + email, "success");
            } else {
              // Email tidak terdaftar
              $("#email").addClass("is-invalid");
              showAlert("❌ Email tidak ditemukan. Silakan coba lagi.", "danger");
              $("#email").val("").focus();
            }
          }, 1200);
        });

        // ============================================================
        //  CHECK URL PARAMETERS (untuk pesan dari halaman lain)
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get("message");
        if (msg === "expired") {
          showToast("⏰ Link reset password sudah kadaluarsa. Silakan minta ulang.", "info");
        } else if (msg === "success") {
          showToast("🔐 Password berhasil direset. Silakan login dengan password baru.", "success");
        }

        // ============================================================
        //  ENTER KEY SUPPORT - handled by form submit
        // ============================================================

        // ============================================================
        //  AUTO FOCUS
        // ============================================================
        if ($("#email").val()) {
          $("#email").select();
        }
      }); // end doc ready
    </script>
  </body>
</html>
