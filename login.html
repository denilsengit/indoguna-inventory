<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · IMS PT Indoguna Utama</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="icon" type="image/x-icon" href="img/logo-indoguna.png" />

    <style>
      :root {
        --indoguna-red: #c8102e;
        --indoguna-red-dark: #a00d24;
        --indoguna-red-light: #fee2e2;
        --indoguna-gray: #f3f4f6;
        --indoguna-gray-border: #e5e7eb;
        --indoguna-text: #1f2937;
        --indoguna-text-muted: #6b7280;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--indoguna-gray);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-wrapper {
        width: 100%;
        max-width: 440px;
        margin: 0 auto;
      }

      .login-card {
        background: #fff;
        border-radius: 24px;
        padding: 40px 36px;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.08),
          0 8px 24px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--indoguna-gray-border);
        transition: all 0.3s ease;
      }

      .login-card:hover {
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.1);
      }

      .login-brand {
        text-align: center;
        margin-bottom: 32px;
      }

      .login-brand .brand-icon {
        width: 64px;
        height: 64px;
        background: var(--indoguna-red);
        border-radius: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 800;
        font-size: 28px;
        margin-bottom: 16px;
        box-shadow: 0 4px 16px;
      }

      .login-brand h1 {
        font-weight: 800;
        font-size: 24px;
        color: var(--indoguna-text);
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      .login-brand .subtitle {
        font-size: 14px;
        color: var(--indoguna-text-muted);
        font-weight: 400;
      }

      .login-brand .subtitle strong {
        color: var(--indoguna-red);
        font-weight: 600;
      }

      .form-label {
        font-weight: 600;
        font-size: 14px;
        color: var(--indoguna-text);
        margin-bottom: 6px;
      }

      .form-label .required-star {
        color: #dc2626;
        font-size: 16px;
        margin-left: 2px;
      }

      .form-control {
        border-radius: 12px;
        border: 1.5px solid var(--indoguna-gray-border);
        padding: 12px 16px;
        font-size: 14px;
        transition: all 0.25s ease;
        background: #fafbfc;
      }

      .form-control:focus {
        border-color: var(--indoguna-red);
        box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.1);
        background: #fff;
      }

      .form-control.is-invalid {
        border-color: #dc2626;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
      }

      .form-control.is-invalid:focus {
        border-color: #dc2626;
        box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
      }

      .input-group-text {
        background: #fafbfc;
        border: 1.5px solid var(--indoguna-gray-border);
        border-right: none;
        border-radius: 12px 0 0 12px;
        color: var(--indoguna-text-muted);
        padding: 12px 14px;
      }

      .input-group .form-control {
        border-radius: 0 12px 12px 0;
        border-left: none;
      }

      .input-group .form-control:focus {
        border-left: none;
      }

      .input-group .form-control.is-invalid {
        border-left: none;
      }

      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--indoguna-text-muted);
        cursor: pointer;
        padding: 4px;
        font-size: 18px;
        z-index: 5;
        transition: color 0.2s;
      }

      .password-toggle:hover {
        color: var(--indoguna-text);
      }

      .password-wrapper {
        position: relative;
      }

      .password-wrapper .form-control {
        padding-right: 44px;
      }

      .btn-login {
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        background: var(--indoguna-red);
        border: none;
        color: #fff;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
      }

      .btn-login:hover {
        background: var(--indoguna-red-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(200, 16, 46, 0.3);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-login .spinner-border {
        width: 20px;
        height: 20px;
        border-width: 2px;
      }

      .form-check-label {
        font-size: 14px;
        color: var(--indoguna-text-muted);
        font-weight: 500;
      }

      .form-check-input {
        border-radius: 4px;
        border: 1.5px solid var(--indoguna-gray-border);
        width: 18px;
        height: 18px;
        margin-top: 2px;
        cursor: pointer;
      }

      .form-check-input:checked {
        background-color: var(--indoguna-red);
        border-color: var(--indoguna-red);
      }

      .form-check-input:focus {
        border-color: var(--indoguna-red);
        box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.15);
      }

      .login-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 13px;
        color: var(--indoguna-text-muted);
      }

      .login-footer a {
        color: var(--indoguna-red);
        text-decoration: none;
        font-weight: 600;
      }

      .login-footer a:hover {
        text-decoration: underline;
      }

      .alert-custom {
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 14px;
        border: none;
        display: none;
        animation: slideDown 0.35s ease;
      }

      .alert-custom.show {
        display: block;
      }

      .alert-custom.danger {
        background: #fef2f2;
        color: #991b1b;
        border-left: 4px solid #dc2626;
      }

      .alert-custom.success {
        background: #ecfdf5;
        color: #065f46;
        border-left: 4px solid #059669;
      }

      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .login-card {
          padding: 28px 20px;
        }

        .login-brand .brand-icon {
          width: 52px;
          height: 52px;
          font-size: 22px;
        }

        .login-brand h1 {
          font-size: 20px;
        }
      }

      /* Toast for logout message */
      .toast-container-custom {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        max-width: 380px;
      }

      .toast-custom {
        background: #fff;
        border-radius: 12px;
        padding: 14px 20px;
        border-left: 5px solid var(--indoguna-red);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        gap: 14px;
        animation: slideInRight 0.35s ease;
        border: 1px solid var(--indoguna-gray-border);
        margin-bottom: 10px;
      }

      .toast-custom.success {
        border-left-color: #059669;
      }

      .toast-custom .toast-icon {
        font-size: 20px;
        color: var(--indoguna-red);
      }

      .toast-custom.success .toast-icon {
        color: #059669;
      }

      .toast-custom .toast-msg {
        flex: 1;
        font-weight: 500;
        color: #1f2937;
        font-size: 14px;
      }

      .toast-custom .toast-close {
        background: none;
        border: none;
        font-size: 18px;
        color: #9ca3af;
        cursor: pointer;
        padding: 0 4px;
      }

      .toast-custom .toast-close:hover {
        color: #4b5563;
      }

      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(40px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- Brand -->
        <div class="login-brand">
          <img src="img/logo-indoguna.png" alt="Indoguna Logo" class="brand-icon" />
          <h1>IMS Indoguna</h1>
          <div class="subtitle">
            Inventory Management System<br />
            <strong>PT Indoguna Utama</strong>
          </div>
        </div>

        <!-- Alert -->
        <div class="alert-custom" id="loginAlert">
          <i class="bi bi-exclamation-circle me-2"></i>
          <span id="alertMessage"></span>
        </div>

        <!-- Form Login -->
        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">
              Email / Username
              <span class="required-star">*</span>
            </label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="email" placeholder="admin@indoguna.com" value="admin@indoguna.com" required autofocus />
              <div class="invalid-feedback">Masukkan email yang valid.</div>
            </div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              Password
              <span class="required-star">*</span>
            </label>
            <div class="password-wrapper">
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Minimal 6 karakter" value="password123" required minlength="6" />
                <div class="invalid-feedback">Password minimal 6 karakter.</div>
              </div>
              <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" checked />
              <label class="form-check-label" for="rememberMe">Ingat saya</label>
            </div>
            <a href="#" class="text-decoration-none" style="font-size: 14px; color: var(--indoguna-red); font-weight: 600">Lupa password?</a>
          </div>

          <button type="submit" class="btn-login" id="loginBtn">
            <span id="loginText"><i class="bi bi-box-arrow-in-right me-2"></i>Masuk</span>
            <span id="loginSpinner" class="d-none">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Memproses...
            </span>
          </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">&copy; 2026 PT Indoguna Utama · v1.0</div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container-custom" id="toastContainer"></div>

    <script>
      $(function () {
        // ============================================================
        //  TOGGLE PASSWORD VISIBILITY
        // ============================================================
        $("#togglePassword").on("click", function () {
          const passwordInput = $("#password");
          const icon = $(this).find("i");
          if (passwordInput.attr("type") === "password") {
            passwordInput.attr("type", "text");
            icon.removeClass("bi-eye").addClass("bi-eye-slash");
          } else {
            passwordInput.attr("type", "password");
            icon.removeClass("bi-eye-slash").addClass("bi-eye");
          }
        });

        // ============================================================
        //  SHOW TOAST
        // ============================================================
        function showToast(message, type) {
          type = type || "info";
          const iconMap = {
            success: "bi-check-circle-fill",
            danger: "bi-x-circle-fill",
            info: "bi-info-circle-fill",
          };
          const icon = iconMap[type] || iconMap.info;
          const container = $("#toastContainer");
          const toast = $(`
                            <div class="toast-custom ${type}">
                                <div class="toast-icon"><i class="bi ${icon}"></i></div>
                                <div class="toast-msg">${message}</div>
                                <button class="toast-close"><i class="bi bi-x-lg"></i></button>
                            </div>
                        `);
          container.append(toast);
          setTimeout(function () {
            toast.fadeOut(300, function () {
              $(this).remove();
            });
          }, 4500);
          toast.find(".toast-close").on("click", function () {
            toast.fadeOut(200, function () {
              $(this).remove();
            });
          });
        }

        // ============================================================
        //  SHOW ALERT
        // ============================================================
        function showAlert(message, type) {
          const alert = $("#loginAlert");
          const alertMsg = $("#alertMessage");
          alert.removeClass("show danger success");
          if (type === "danger") {
            alert.addClass("danger");
          } else if (type === "success") {
            alert.addClass("success");
          }
          alertMsg.text(message);
          alert.addClass("show");
          clearTimeout(window.alertTimeout);
          window.alertTimeout = setTimeout(function () {
            alert.removeClass("show");
          }, 5000);
        }

        // ============================================================
        //  LOGIN FORM SUBMIT
        // ============================================================
        $("#loginForm").on("submit", function (e) {
          e.preventDefault();

          const email = $("#email").val().trim();
          const password = $("#password").val();

          // Reset validation
          $("#email").removeClass("is-invalid");
          $("#password").removeClass("is-invalid");

          // Validasi sederhana
          let valid = true;
          let errorMessage = "";

          if (!email || !email.includes("@")) {
            $("#email").addClass("is-invalid");
            valid = false;
            errorMessage = "Email tidak boleh kosong dan harus valid.";
          }
          if (!password || password.length < 6) {
            $("#password").addClass("is-invalid");
            valid = false;
            if (!errorMessage) {
              errorMessage = "Password minimal 6 karakter.";
            }
          }

          if (!valid) {
            // Tampilkan toast notifikasi
            showToast("⚠️ " + errorMessage, "danger");
            showAlert("Mohon periksa kembali email dan password Anda.", "danger");
            return;
          }

          // Simulasi loading
          $("#loginText").addClass("d-none");
          $("#loginSpinner").removeClass("d-none");
          $("#loginBtn").prop("disabled", true);

          // Simulasi proses login dengan delay
          setTimeout(function () {
            const foundUser = users.find((u) => u.email.toLowerCase() === email.toLowerCase() && u.password === password);

            // Reset button state
            $("#loginText").removeClass("d-none");
            $("#loginSpinner").addClass("d-none");
            $("#loginBtn").prop("disabled", false);

            if (foundUser) {
              // Login sukses
              showAlert("✅ Selamat datang, " + foundUser.name + "!", "success");

              // Simulasi redirect ke dashboard
              setTimeout(function () {
                showToast("🔐 Login berhasil sebagai " + foundUser.role.toUpperCase() + ". Mengalihkan...", "success");
                setTimeout(function () {
                  window.location.href = "index.html";
                }, 800);
              }, 600);
            } else {
              // Login gagal
              showAlert("❌ Email atau password salah. Silakan coba lagi.", "danger");
              showToast("❌ Email atau password salah.", "danger");
              $("#password").val("").focus();
            }
          }, 1200);
        });

        // ============================================================
        //  CHECK FOR LOGOUT MESSAGE (dari URL parameter)
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const logoutMsg = urlParams.get("logout");
        if (logoutMsg === "success") {
          showToast("🔒 Anda telah berhasil keluar.", "success");
        } else if (logoutMsg === "expired") {
          showToast("⏰ Sesi Anda telah berakhir. Silakan login kembali.", "info");
        }

        // ============================================================
        //  AUTO FOCUS pada email jika ada
        // ============================================================
        if ($("#email").val()) {
          $("#password").focus();
        }

        // ============================================================
        //  VALIDASI REAL-TIME (trigger saat input)
        // ============================================================
        $("#email, #password").on("input", function () {
          $(this).removeClass("is-invalid");
          const alert = $("#loginAlert");
          alert.removeClass("show");
        });
      }); // end doc ready
    </script>
  </body>
</html>
